# =============================================================================
# GitHub Actions CI 파이프라인
# =============================================================================
# 이 파일은 코드가 push되거나 PR이 생성될 때 자동으로 실행되는
# 지속적 통합(Continuous Integration) 파이프라인을 정의한다.
#
# 두 개의 job이 독립적으로 병렬 실행된다:
#   - backend: Go 테스트 + 빌드
#   - frontend: npm 린트 + 빌드
#
# 왜 CI가 필요한가?
#   - 코드 변경이 기존 기능을 깨뜨리지 않는지 자동 확인
#   - PR 머지 전에 빌드 성공 여부를 검증
#   - 팀원 간 코드 품질 기준을 일관되게 유지
# =============================================================================

name: CI

# 트리거 조건: main 브랜치에 push 또는 PR 생성 시 실행
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Node.js 20 deprecation 대응 — 액션을 Node 24 native 메이저 버전으로 업그레이드
# -----------------------------------------------------------------------------
# 배경:
# GitHub은 2025-09-19 공지에서 Node.js 20을 사용하는 액션이 deprecated 되었으며
# 2026-06-02부터 Node.js 24가 default로 강제 전환되고, Node.js 20은 2026년
# 가을 후반에 러너에서 완전히 제거된다고 밝혔다.
# 참고: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
#
# 대응 방식 (정공법 — 액션 메이저 업그레이드):
# 다음 액션들의 v6 메이저 릴리스가 이미 Node 24 native로 출시되어 있다:
#   - actions/checkout@v6      (v5/v6 모두 Node 24, v6가 latest stable)
#   - actions/setup-go@v6      (v6.0.0에서 Node 24로 업그레이드)
#   - actions/setup-node@v6    (v5에서 Node 24 도입, v6가 latest stable)
#
# 따라서 환경변수(FORCE_JAVASCRIPT_ACTIONS_TO_NODE24)로 임시 강제 전환하지
# 않고, 액션 자체를 메이저 업그레이드한다. 이것이 GitHub 공식 권장 방법이며
# 장기적으로 더 안정적이다.
#
# 만약 v6 액션이 깨지면 일시적으로 v4/v5로 되돌리고 환경변수 강제 방식으로
# 우회할 수 있다 (이전 PR 이력 참조).

jobs:
  # ---------------------------------------------------------------------------
  # 백엔드 (Go) 테스트 + 빌드
  # ---------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      # 저장소 코드를 체크아웃
      - uses: actions/checkout@v6

      # Go 환경 세팅
      # cache-dependency-path: setup-go의 기본 cache 키는 repository root의
      # go.sum을 찾는데, 이 프로젝트는 go.sum이 backend/ 하위에 있어 기본값으로는
      # cache 복원이 실패하면서 warning이 발생한다 (CI 주석 annotation에 표시됨).
      # 명시적으로 backend/go.sum 경로를 지정하면 정상적으로 module cache가 적용되고
      # 후속 빌드가 빨라진다.
      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      # 의존성 다운로드
      - name: Download dependencies
        run: go mod download

      # 테스트 실행
      # ./... 패턴은 모든 하위 패키지를 의미
      - name: Run tests
        run: go test ./...

      # 빌드 확인
      # 컴파일이 성공하는지만 확인 (바이너리는 사용하지 않음)
      - name: Build
        run: go build ./cmd/server

  # ---------------------------------------------------------------------------
  # 프론트엔드 (React + TypeScript) 린트 + 빌드
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      # Node.js 환경 세팅
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 의존성 설치
      # npm ci: package-lock.json 기반으로 정확한 버전 설치 (CI 환경에 적합)
      - name: Install dependencies
        run: npm ci

      # 린트 검사
      # 코드 스타일과 잠재적 오류를 정적 분석
      - name: Lint
        run: npm run lint

      # 프로덕션 빌드
      # TypeScript 컴파일 + Vite 번들링이 성공하는지 확인
      - name: Build
        run: npm run build
