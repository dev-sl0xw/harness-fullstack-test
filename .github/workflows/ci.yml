# =============================================================================
# GitHub Actions CI 파이프라인
# =============================================================================
# 이 파일은 코드가 push되거나 PR이 생성될 때 자동으로 실행되는
# 지속적 통합(Continuous Integration) 파이프라인을 정의한다.
#
# 두 개의 job이 독립적으로 병렬 실행된다:
#   - backend: Go 테스트 + 빌드
#   - frontend: npm 린트 + 빌드
#
# 왜 CI가 필요한가?
#   - 코드 변경이 기존 기능을 깨뜨리지 않는지 자동 확인
#   - PR 머지 전에 빌드 성공 여부를 검증
#   - 팀원 간 코드 품질 기준을 일관되게 유지
# =============================================================================

name: CI

# 트리거 조건: main 브랜치에 push 또는 PR 생성 시 실행
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Node.js 20 deprecation 대응
# -----------------------------------------------------------------------------
# GitHub은 2025-09-19 공지에서 Node.js 20을 사용하는 액션이 deprecated 되었으며
# 2026-06-02부터 Node.js 24가 default로 강제 전환된다고 밝혔다 (그 이후에는
# Node.js 20이 9월 16일에 러너에서 완전히 제거됨).
#
# 현재 actions/checkout@v4, actions/setup-go@v5, actions/setup-node@v4는
# 여전히 내부적으로 Node.js 20에서 실행되어 CI annotations에 deprecation
# warning이 매번 표시된다. 이 환경변수로 Node.js 24를 미리 강제하면 warning이
# 사라지고, 향후 강제 전환 시점에 발생할 잠재적 호환성 이슈를 *지금* 확인할
# 수 있다 (사후 대응이 아니라 사전 대비).
#
# 참고: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # 백엔드 (Go) 테스트 + 빌드
  # ---------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      # 저장소 코드를 체크아웃
      - uses: actions/checkout@v4

      # Go 환경 세팅
      # cache-dependency-path: setup-go의 기본 cache 키는 워크플로우와 같은 디렉토리의
      # go.sum을 찾는데, 이 프로젝트는 go.sum이 backend/ 하위에 있어 기본값으로는
      # cache 복원이 실패하면서 warning이 발생한다 (CI 주석 annotation에 표시됨).
      # 명시적으로 backend/go.sum 경로를 지정하면 정상적으로 module cache가 적용되고
      # 후속 빌드가 빨라진다.
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum

      # 의존성 다운로드
      - name: Download dependencies
        run: go mod download

      # 테스트 실행
      # ./... 패턴은 모든 하위 패키지를 의미
      - name: Run tests
        run: go test ./...

      # 빌드 확인
      # 컴파일이 성공하는지만 확인 (바이너리는 사용하지 않음)
      - name: Build
        run: go build ./cmd/server

  # ---------------------------------------------------------------------------
  # 프론트엔드 (React + TypeScript) 린트 + 빌드
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      # Node.js 환경 세팅
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 의존성 설치
      # npm ci: package-lock.json 기반으로 정확한 버전 설치 (CI 환경에 적합)
      - name: Install dependencies
        run: npm ci

      # 린트 검사
      # 코드 스타일과 잠재적 오류를 정적 분석
      - name: Lint
        run: npm run lint

      # 프로덕션 빌드
      # TypeScript 컴파일 + Vite 번들링이 성공하는지 확인
      - name: Build
        run: npm run build
