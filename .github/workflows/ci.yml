# =============================================================================
# GitHub Actions CI 파이프라인
# =============================================================================
# 이 파일은 코드가 push되거나 PR이 생성될 때 자동으로 실행되는
# 지속적 통합(Continuous Integration) 파이프라인을 정의한다.
#
# 두 개의 job이 독립적으로 병렬 실행된다:
#   - backend: Go 테스트 + 빌드
#   - frontend: npm 린트 + 빌드
#
# 왜 CI가 필요한가?
#   - 코드 변경이 기존 기능을 깨뜨리지 않는지 자동 확인
#   - PR 머지 전에 빌드 성공 여부를 검증
#   - 팀원 간 코드 품질 기준을 일관되게 유지
# =============================================================================

name: CI

# 트리거 조건: main 브랜치에 push 또는 PR 생성 시 실행
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Node.js 20 deprecation 대응 — 액션을 Node 24 native 메이저 버전으로 업그레이드
# -----------------------------------------------------------------------------
# 배경:
# GitHub은 2025-09-19 공지에서 Node.js 20을 사용하는 액션이 deprecated 되었으며
# 2026-06-02부터 Node.js 24가 default로 강제 전환되고, Node.js 20은 2026년
# 가을 후반에 러너에서 완전히 제거된다고 밝혔다.
# 참고: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
#
# 대응 방식 (정공법 — 액션 메이저 업그레이드):
# 다음 액션들의 v6 메이저 릴리스가 이미 Node 24 native로 출시되어 있다:
#   - actions/checkout@v6      (v5/v6 모두 Node 24, v6가 latest stable)
#   - actions/setup-go@v6      (v6.0.0에서 Node 24로 업그레이드)
#   - actions/setup-node@v6    (v5에서 Node 24 도입, v6가 latest stable)
#
# 따라서 환경변수(FORCE_JAVASCRIPT_ACTIONS_TO_NODE24)로 임시 강제 전환하지
# 않고, 액션 자체를 메이저 업그레이드한다. 이것이 GitHub 공식 권장 방법이며
# 장기적으로 더 안정적이다.
#
# 만약 v6 액션이 깨지면 일시적으로 v4/v5로 되돌리고 환경변수 강제 방식으로
# 우회할 수 있다 (이전 PR 이력 참조).

# 최소 권한 원칙: CI는 checkout+빌드만 하므로 contents: read만 필요.
# 기본값은 너무 넓어 공급망 공격면을 불필요하게 넓힌다.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # 백엔드 (Go) 테스트 + 빌드
  # ---------------------------------------------------------------------------
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      # 저장소 코드를 체크아웃
      # SHA pin: mutable major tag(@v6)만 쓰면 같은 표기여도 실제 리비전이 바뀔 수 있다.
      # SHA로 고정하면 재현성이 보장되고 공급망 공격에 대한 통제가 강화된다.
      # Dependabot이 새 릴리스를 자동 업데이트 PR로 제안하므로 유지 비용은 낮다.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Go 환경 세팅
      #
      # go-version-file: backend/go.mod 의 `go` 지시문에서 버전을 자동으로 읽어
      # workflow와 go.mod 가 따로 노는 drift 를 막는다.
      # cache-dependency-path: go.sum이 backend/ 하위에 있어 명시 지정 필요.
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      # 의존성 다운로드
      - name: Download dependencies
        run: go mod download

      # 테스트 실행
      # ./... 패턴은 모든 하위 패키지를 의미
      - name: Run tests
        run: go test ./...

      # 빌드 확인
      # 컴파일이 성공하는지만 확인 (바이너리는 사용하지 않음)
      - name: Build
        run: go build ./cmd/server

  # ---------------------------------------------------------------------------
  # 프론트엔드 (React + TypeScript) 린트 + 빌드
  # ---------------------------------------------------------------------------
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # Node.js 환경 세팅
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 의존성 설치
      # npm ci: package-lock.json 기반으로 정확한 버전 설치 (CI 환경에 적합)
      - name: Install dependencies
        run: npm ci

      # 린트 검사
      # 코드 스타일과 잠재적 오류를 정적 분석
      - name: Lint
        run: npm run lint

      # 프로덕션 빌드
      # TypeScript 컴파일 + Vite 번들링이 성공하는지 확인
      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # 아키텍처 다이어그램 Mermaid 문법 검증
  # ---------------------------------------------------------------------------
  # docs/architecture/ 하위의 .mmd 파일들이 유효한 Mermaid 문법인지 확인한다.
  # 왜 필요한가?
  #   - Mermaid 문법 오류가 있으면 GitHub에서 다이어그램이 렌더링되지 않음
  #   - .mmd 파일과 .md wrapper 파일이 짝을 이루는지 검증
  #   - 최소 7개 다이어그램이 존재하는지 확인
  diagrams-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      # Mermaid CLI로 각 .mmd 파일을 SVG로 변환하여 문법 검증
      - name: Validate Mermaid diagrams
        run: |
          set -e
          if [ ! -d docs/architecture ] || [ -z "$(ls docs/architecture/*.mmd 2>/dev/null)" ]; then
            echo "No .mmd files found — skipping validation"
            exit 0
          fi
          for mmd in docs/architecture/*.mmd; do
            echo "Validating: $mmd"
            npx -y @mermaid-js/mermaid-cli -i "$mmd" -o /tmp/$(basename "$mmd" .mmd).svg
          done

      # 최소 7개 다이어그램 존재 확인
      - name: Verify diagram count (≥7)
        run: |
          if [ ! -d docs/architecture ]; then exit 0; fi
          count=$(ls docs/architecture/*.mmd 2>/dev/null | wc -l)
          [ "$count" -ge 7 ] || { echo "Expected ≥7 diagrams, found $count"; exit 1; }

      # .mmd ↔ .md wrapper 짝 검증
      - name: Verify .mmd ↔ .md pairing
        run: |
          if [ ! -d docs/architecture ]; then exit 0; fi
          for mmd in docs/architecture/*.mmd; do
            wrapper="${mmd%.mmd}.md"
            [ -f "$wrapper" ] || { echo "Missing wrapper: $wrapper"; exit 1; }
          done
          echo "All .mmd files have matching .md wrappers"
