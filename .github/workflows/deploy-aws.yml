# =============================================================================
# 파일: .github/workflows/deploy-aws.yml
# 역할: AWS CDK를 사용하여 인프라를 수동으로 배포하는 워크플로우.
# 시스템 내 위치: GitHub Actions CI/CD 파이프라인 (배포 전용).
# 관계:
#   - infra/aws-cdk/bin/app.ts의 5개 Stack을 배포
#   - OIDC를 통해 AWS 자격증명 획득 (Access Key 없음)
#   - deploy-aws.yml은 배포, ci.yml은 빌드/테스트 역할 분리
# 설계 의도:
#   - workflow_dispatch(수동 트리거)만 허용 — 인프라 변경은 신중하게 검토 후 적용
#   - OIDC: GitHub Actions가 AWS에 직접 인증 (Access Key를 Secrets에 저장할 필요 없음)
#   - environment 보호 규칙: stg/prod는 GitHub Environment Protection Rules로 승인 필요
#   - ADR-0009 (Deployment Strategy): dev=workflow_dispatch, stg/prod=manual-approval
#
# 사전 준비:
#   1. AWS 계정에 GitHub OIDC provider 등록
#   2. IAM Role 생성 (trust policy: GitHub Actions OIDC)
#   3. Repository secrets 설정:
#      - AWS_ROLE_ARN_DEV: dev 환경 IAM Role ARN
#      - AWS_ROLE_ARN_STG: stg 환경 IAM Role ARN
#      - AWS_ROLE_ARN_PROD: prod 환경 IAM Role ARN
#   4. GitHub Environment 설정 (stg, prod):
#      - Required reviewers 추가
#      - Branch protection rules 설정
# =============================================================================

name: Deploy AWS

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '배포 환경 (dev: 즉시 배포, stg/prod: 승인 필요)'
        required: true
        type: choice
        options:
          - dev
          - stg
          - prod
      action:
        description: '실행할 작업 (synth-only: 검증만, deploy: 실제 배포)'
        required: true
        type: choice
        default: synth-only
        options:
          - synth-only
          - deploy

# OIDC 토큰 발급을 위한 최소 권한 설정
# id-token: write — AWS OIDC 인증을 위한 JWT 토큰 발급 권한
# contents: read — 소스 코드 체크아웃 권한
permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: CDK ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # GitHub Environment: stg/prod 환경에 Required Reviewers 설정 시 승인 후 실행
    # environment 보호 규칙 설정: Settings > Environments > stg/prod > Deployment protection rules
    environment: ${{ inputs.environment }}

    steps:
      # -----------------------------------------------------------------------
      # 소스 코드 체크아웃
      # -----------------------------------------------------------------------
      # Pin to specific commit hash (보안 모범 사례: tag 대신 commit hash 사용)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      # -----------------------------------------------------------------------
      # Node.js 설치
      # -----------------------------------------------------------------------
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4
        with:
          node-version: '22'
          cache: 'npm'
          # package-lock.json 경로 지정 → npm ci 캐싱 활성화
          cache-dependency-path: infra/aws-cdk/package-lock.json

      # -----------------------------------------------------------------------
      # OIDC 기반 AWS 자격증명 획득
      # -----------------------------------------------------------------------
      # OIDC(OpenID Connect)란?
      #   - GitHub Actions가 AWS에 직접 인증하는 연동 방식
      #   - 세션 토큰이 1시간 후 자동 만료 (Access Key 영구 유출 위험 없음)
      #   - IAM Role의 trust policy에 GitHub 리포지토리/브랜치 조건 설정 가능
      #
      # role-to-assume: 환경별 IAM Role ARN (Repository secret에서 동적 참조)
      #   format(): "AWS_ROLE_ARN_DEV", "AWS_ROLE_ARN_STG", "AWS_ROLE_ARN_PROD" 중 하나
      #   예: secrets['AWS_ROLE_ARN_DEV'] = "arn:aws:iam::123456789012:role/hft-dev-github-actions"
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_ROLE_ARN_{0}', inputs.environment)] }}
          aws-region: ap-northeast-1

      # -----------------------------------------------------------------------
      # CDK 의존성 설치
      # -----------------------------------------------------------------------
      # npm ci: package-lock.json 기반 정확한 버전 설치 (npm install보다 엄격)
      # CI 환경에서는 항상 npm ci 사용 (재현성 보장)
      - name: Install CDK dependencies
        working-directory: infra/aws-cdk
        run: npm ci

      # -----------------------------------------------------------------------
      # CDK Synth (항상 실행)
      # -----------------------------------------------------------------------
      # synth: CloudFormation 템플릿을 생성하고 문법/타입 오류를 검증
      # 배포 없이 인프라 코드가 유효한지 확인하는 필수 단계
      - name: CDK Synth
        working-directory: infra/aws-cdk
        run: npx cdk synth --context env=${{ inputs.environment }}

      # -----------------------------------------------------------------------
      # CDK Deploy (action=deploy일 때만 실행)
      # -----------------------------------------------------------------------
      # --require-approval never: 대화형 승인 없이 배포 진행
      #   (GitHub Environment Protection Rules로 이미 인간 승인을 거쳤으므로 안전)
      # --all: 5개 Stack 모두 배포 (의존성 순서 자동 처리)
      - name: CDK Deploy
        if: inputs.action == 'deploy'
        working-directory: infra/aws-cdk
        run: |
          npx cdk deploy \
            --all \
            --context env=${{ inputs.environment }} \
            --require-approval never \
            --progress events
